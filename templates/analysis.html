<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Analiza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container py-5">

    <div class="d-flex justify-content-between mb-4">
        <h1>Analiza treningów</h1>
        <a href="{{ url_for('mainPage') }}" class="btn btn-secondary">Powrót</a>
    </div>

    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Liczba treningów</h5>
                    <h2>{{ total_workouts }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Najczęstsze ćwiczenie</h5>
                    <h4>{{ most_popular_exercise or "Brak danych" }}</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-body">
            <form method="GET">
                <label class="form-label">Wybierz ćwiczenie</label>
                <select name="exercise_id" class="form-select" onchange="this.form.submit()">
                    <option value="">-- wybierz --</option>
                    {% for ex in exercises %}
                        <option value="{{ ex.id }}"
                            {% if selected_exercise_id == ex.id %}selected{% endif %}>
                            {{ ex.name }}
                        </option>
                    {% endfor %}
                </select>
            </form>
        </div>
    </div>

    {% if selected_exercise_id %}
    <div class="row mb-4">
        <div class="col-md-6">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Łączna liczba serii</h5>
                    <h2>{{ total_sets }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card text-center shadow-sm">
                <div class="card-body">
                    <h5>Łączna objętość (kg)</h5>
                    <h2>{{ total_volume }}</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="mb-3">Wykres progresu objętości</h5>
            <canvas id="progressChart"></canvas>
        </div>
    </div>
    {% endif %}

</div>

<script>
const ctx = document.getElementById('progressChart');

if (ctx) {
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ chart_labels | tojson }},
            datasets: [{
                label: 'Objętość (kg)',
                data: {{ chart_volumes | tojson }},
                borderWidth: 2,
                fill: false
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}
</script>

</body>
</html>
