<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edycja treningu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-header bg-warning">
            <h1 class="h2 mb-0">Edycja treningu</h1>
        </div>

        <div class="card-body">
            <form method="POST">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="workout_name" class="form-label">Nazwa treningu</label>
                        <input
                            type="text"
                            id="workout_name"
                            name="workout_name"
                            class="form-control"
                            value="{{ workout.name }}"
                            required
                        >
                    </div>

                    <div class="col-md-6">
                        <label for="workout_date" class="form-label">Data treningu</label>
                        <input
                            type="date"
                            id="workout_date"
                            name="workout_date"
                            class="form-control"
                            value="{{ workout.date }}"
                            required
                        >
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h3 mb-0">Ćwiczenia</h2>
                    <button type="button" class="btn btn-success" onclick="addExerciseRow()">
                        + Dodaj ćwiczenie
                    </button>
                </div>

                <div id="exercise-container">
                    {% for exercise in exercises_data %}
                    <div class="border rounded p-3 mb-3 exercise-row">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-3">
                                <label class="form-label">Nazwa ćwiczenia</label>
                                <select name="exercise_id[]" class="form-select" required>
                                    <option value="">Wybierz ćwiczenie</option>
                                    {% for ex in exercises %}
                                        <option value="{{ ex.id }}"
                                            {% if ex.id == exercise.exercise_id %}selected{% endif %}>
                                            {{ ex.name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-2">
                                <label class="form-label">Serie</label>
                                <input
                                    type="number"
                                    name="sets[]"
                                    class="form-control"
                                    value="{{ exercise.sets }}"
                                    min="1"
                                    required
                                >
                            </div>

                            <div class="col-md-2">
                                <label class="form-label">Powtórzenia</label>
                                <input
                                    type="number"
                                    name="reps[]"
                                    class="form-control"
                                    value="{{ exercise.reps }}"
                                    min="1"
                                    required
                                >
                            </div>

                            <div class="col-md-2">
                                <label class="form-label">Ciężar (kg)</label>
                                <input
                                    type="number"
                                    step="0.1"
                                    name="weight[]"
                                    class="form-control"
                                    value="{{ exercise.weight }}"
                                >
                            </div>

                            <div class="col-md-3">
                                <button type="button" class="btn btn-danger w-100 remove-exercise">
                                    Usuń ćwiczenie
                                </button>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="{{ url_for('workouts_list') }}" class="btn btn-secondary">Powrót</a>
                    <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="exercise-options-template" class="d-none">
    {% for ex in exercises %}
        <option value="{{ ex.id }}">{{ ex.name }}</option>
    {% endfor %}
</div>

<script>
function addExerciseRow() {
    const container = document.getElementById('exercise-container');

    const row = document.createElement('div');
    row.className = 'border rounded p-3 mb-3 exercise-row';

    row.innerHTML = `
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label">Nazwa ćwiczenia</label>
                <select name="exercise_id[]" class="form-select" required>
                    <option value="">Wybierz ćwiczenie</option>
                    ${document.getElementById('exercise-options-template').innerHTML}
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Serie</label>
                <input type="number" name="sets[]" class="form-control" min="1" required>
            </div>

            <div class="col-md-2">
                <label class="form-label">Powtórzenia</label>
                <input type="number" name="reps[]" class="form-control" min="1" required>
            </div>

            <div class="col-md-2">
                <label class="form-label">Ciężar (kg)</label>
                <input type="number" step="0.1" name="weight[]" class="form-control">
            </div>

            <div class="col-md-3">
                <button type="button" class="btn btn-danger w-100 remove-exercise">
                    Usuń ćwiczenie
                </button>
            </div>
        </div>
    `;

    container.appendChild(row);
}

document.addEventListener('click', function(event) {
    if (event.target.classList.contains('remove-exercise')) {
        const rows = document.querySelectorAll('.exercise-row');

        if (rows.length > 1) {
            event.target.closest('.exercise-row').remove();
        }
    }
});
</script>

</body>
</html>
