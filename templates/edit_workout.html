<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Edycja treningu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="mb-4">Edycja treningu</h1>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nazwa treningu</label>
                    <input type="text" name="workout_name" class="form-control" value="{{ workout.name }}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Data treningu</label>
                    <input type="date" name="workout_date" class="form-control" value="{{ workout.date }}" required>
                </div>

                <hr>
                <h4>Ćwiczenia</h4>

                <div id="exercise-container">
                    {% for exercise in exercises_data %}
                    <div class="row g-3 align-items-end mb-3 exercise-row">
                        <div class="col-md-3">
                            <label class="form-label">Ćwiczenie</label>
                            <input type="text" name="exercise_name[]" class="form-control" value="{{ exercise.exercise_name }}" required>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Liczba serii</label>
                            <input type="number" name="sets[]" class="form-control" value="{{ exercise.sets }}" required>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Powtórzenia</label>
                            <input type="number" name="reps[]" class="form-control" value="{{ exercise.reps }}" required>
                        </div>

                        <div class="col-md-2">
                            <label class="form-label">Ciężar</label>
                            <input type="number" step="0.1" name="weight[]" class="form-control" value="{{ exercise.weight }}" required>
                        </div>

                        <div class="col-md-2">
                            <button type="button" class="btn btn-danger remove-exercise">Usuń</button>
                        </div>
                    </div>
                    {% endfor %}
                </div>

                <button type="button" class="btn btn-success mb-3" onclick="addExerciseRow()">Dodaj ćwiczenie</button>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Zapisz zmiany</button>
                    <a href="{{ url_for('workouts_list') }}" class="btn btn-secondary">Anuluj</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function addExerciseRow() {
    const container = document.getElementById('exercise-container');

    const row = document.createElement('div');
    row.classList.add('row', 'g-3', 'align-items-end', 'mb-3', 'exercise-row');

    row.innerHTML = `
        <div class="col-md-3">
            <label class="form-label">Ćwiczenie</label>
            <input type="text" name="exercise_name[]" class="form-control" required>
        </div>

        <div class="col-md-2">
            <label class="form-label">Liczba serii</label>
            <input type="number" name="sets[]" class="form-control" required>
        </div>

        <div class="col-md-2">
            <label class="form-label">Powtórzenia</label>
            <input type="number" name="reps[]" class="form-control" required>
        </div>

        <div class="col-md-2">
            <label class="form-label">Ciężar</label>
            <input type="number" step="0.1" name="weight[]" class="form-control" required>
        </div>

        <div class="col-md-2">
            <button type="button" class="btn btn-danger remove-exercise">Usuń</button>
        </div>
    `;

    container.appendChild(row);
}

document.addEventListener('click', function(e) {
    if (e.target.classList.contains('remove-exercise')) {
        e.target.closest('.exercise-row').remove();
    }
});
</script>
</body>
</html>
