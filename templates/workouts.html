<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lista treningów</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4">Lista treningów</h1>

    <a href="/" class="btn btn-secondary mb-3">Powrót</a>
    <a href="/add_workout" class="btn btn-primary mb-3">Dodaj trening</a>

    {% if workouts %}
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nazwa</th>
                            <th>Data</th>
                            <th>Akcje</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for workout in workouts %}
                        <tr>
                            <td>{{ workout.id }}</td>
                            <td>{{ workout.name }}</td>
                            <td>{{ workout.date }}</td>
                            <td>
                                <!-- Edytuj -->
                                <a href="{{ url_for('edit_workout', workout_id=workout.id) }}"
                                   class="btn btn-warning btn-sm">
                                    Edytuj
                                </a>

                                <!-- Usuń -->
                                <form action="{{ url_for('delete_workout', workout_id=workout.id) }}"
                                      method="POST"
                                      style="display:inline;">
                                    <button type="submit"
                                            class="btn btn-danger btn-sm"
                                            onclick="return confirm('Na pewno usunąć trening?');">
                                        Usuń
                                    </button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    {% else %}
        <div class="alert alert-info">
            Brak zapisanych treningów.
        </div>
    {% endif %}
</div>

</body>
</html>
